version: '3.8'
services:
  neo4j:
    image: neo4j:5.26.21-community
    container_name: hazard-detection-neo4j
    ports:
      - "7474:7474"  # Neo4j browser
      - "7687:7687"  # Neo4j bolt protocol
    environment:
      NEO4J_AUTH: neo4j/hazarddetect123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./volume/neo4j_data:/data
      - ./volume/neo4j_logs:/logs
      - ./volume/neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "hazarddetect123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 3
