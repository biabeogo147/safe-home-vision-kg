# Training configuration for YOLOv8 model
training:
  # Mode selection: 'pretrained' or 'finetuning'
  mode: 'pretrained'

  # Model settings
  model:
    architecture: 'yolov8n.pt'  # Pretrained model path
    imgsz: 640
    epochs: 100
    batch_size: 16
    patience: 10  # Early stopping patience

  # Dataset settings
  dataset:
    train_split: 0.8
    val_split: 0.1
    test_split: 0.1
    num_classes: 12  # Based on ontology.json classes

  # Optimization settings
  optimizer:
    lr0: 0.01
    lrf: 0.01
    momentum: 0.937
    weight_decay: 0.0005

  # Validation metrics
  metrics:
    - 'map50'
    - 'map50-95'
    - 'precision'
    - 'recall'

  # Output settings
  output:
    save_dir: 'runs/detect'
    save_period: 10
    plots: true

# Finetuning-specific settings (only used when mode: 'finetuning')
finetuning:
  freeze: [0]  # Freeze backbone layers
  transfer_learning: true
  augmentations:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    degrees: 0.0
    translate: 0.1
    scale: 0.5
    shear: 0.0
    perspective: 0.0
    flipud: 0.0
    fliplr: 0.5
    mosaic: 1.0
    mixup: 0.0